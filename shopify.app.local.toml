# Local dev config without webhook subscriptions (--use-localhost is incompatible with webhooks).
# Run: shopify app dev --config shopify.app.local.toml --use-localhost

client_id = "24e688be03e9128767a5afba26ddcf2e"
name = "realize-test"
application_url = "https://example.com"
embedded = true

[access_scopes]
scopes = "write_products,read_metaobjects,write_metaobjects"
optional_scopes = [ ]
use_legacy_install_flow = false

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-04"

[auth]
redirect_urls = [
  "https://localhost:3458/auth/callback",
  "https://localhost:3458/auth/shopify/callback",
  "https://localhost:3458/api/auth/callback",
]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
